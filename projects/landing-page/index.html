<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamby AI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
      }
      .hero {
        background: linear-gradient(to right, #333, #666);
        color: white;
        text-align: center;
        padding: 100px 20px;
        animation: fadeIn 1s ease-in;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      h1 {
        font-size: 3em;
        margin: 0;
      }
      p {
        font-size: 1.5em;
      }
      .features {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
      }
      .feature {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        margin: 10px;
        padding: 20px;
        width: 250px;
        text-align: center;
        animation: slideUp 0.5s ease-out;
      }
      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      button {
        background: #4caf50;
        color: white;
        padding: 15px 25px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1.2em;
        margin: 20px auto;
        display: block;
      }
      button:hover {
        background: #45a049;
      }
      footer {
        text-align: center;
        padding: 10px;
        background: #333;
        color: white;
        position: absolute;
        bottom: 0;
        width: 100%;
      }
      @media (max-width: 768px) {
        .features {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1>Lamby AI</h1>
      <p>Your AI-Powered Development Partner</p>
    </section>
    <section class="features">
      <div class="feature">Autonomous Coding</div>
      <div class="feature">Smart Debugging</div>
      <div class="feature">Instant Deploy</div>
    </section>
    <button>Get Started</button>
    <footer>&copy; 2023 Lamby AI</footer>
    <script>
      // Small JavaScript for button click alert
      document.querySelector('button').addEventListener('click', () => {
        alert('Starting your journey with Lamby AI!')
      })
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lamby AI</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: linear-gradient(to bottom, #333, #000);
        color: white;
        scroll-behavior: smooth;
      }
      .hero {
        text-align: center;
        padding: 100px 20px;
        background: linear-gradient(45deg, #4a90e2, #9013fe);
        color: white;
      }
      .hero h1 {
        font-size: 3em;
        margin: 0;
      }
      .hero p {
        font-size: 1.5em;
      }
      .features {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        margin: 10px;
        padding: 20px;
        width: 250px;
        text-align: center;
        transition: transform 0.3s;
      }
      .card:hover {
        transform: scale(1.05);
      }
      button {
        background: #4a90e2;
        border: none;
        color: white;
        padding: 15px 30px;
        font-size: 1em;
        cursor: pointer;
        border-radius: 5px;
      }
      footer {
        text-align: center;
        padding: 20px;
        background: #333;
      }
      @media (max-width: 600px) {
        .hero {
          padding: 50px 10px;
        }
        .features {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="hero">
      <h1>Lamby AI</h1>
      <p>Your AI-Powered Development Partner</p>
      <button>Learn More</button>
    </header>
    <section class="features">
      <div class="card">Autonomous Coding</div>
      <div class="card">Smart Debugging</div>
      <div class="card">Instant Deploy</div>
    </section>
    <footer>
      <p>&copy; 2023 Lamby AI</p>
    </footer>
    <script>
      // Small script for basic interaction, e.g., button click alert
      document.querySelector('button').addEventListener('click', () => {
        alert('Discover Lamby AI!')
      })
    </script>
  </body>
</html>
